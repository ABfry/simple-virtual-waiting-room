root = "."
tmp_dir = "/tmp"

[build]
  bin = "/tmp/app"
  cmd = "GOEXPERIMENT=synctest go build -o /tmp/app ./cmd/waiting-room"
  delay = 100
  exclude_dir = [".git", "vendor", ".air"]
  include_ext = ["go", "mod", "sum"]
  send_interrupt = true
  stop_on_error = true

[log]
  time = true

[runner]
  cmd = ["/tmp/app"]
  env = ["GOEXPERIMENT=synctest"]
