<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Target App</title>
  </head>
  <body>
    <main>
      <section>
        <h1>Sample Target App</h1>
        <p>
          さんぷるたーげっとぺーじ
        </p>
      </section>    
    </main>
    <script>
      (function () {
        const SESSION_COOKIE = 'waiting_room_session_id';
        const HEARTBEAT_INTERVAL_MS = 60_000; // 60 秒ごとに送信

        function getSessionIdFromCookie() {
          const match = document.cookie.match(
            new RegExp(`${SESSION_COOKIE}=([^;]+)`) // cookie に保存されたセッションIDを取得
          );
          return match ? decodeURIComponent(match[1]) : null;
        }

        async function sendHeartbeat() {
          const sessionId = getSessionIdFromCookie();
          if (!sessionId) {
            return; // セッションIDを持っていないユーザーは何もしない
          }

          try {
            await fetch('/waiting-room/session/heartbeat', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({ sessionId }),
            });
          } catch (err) {
            console.error('heartbeat failed', err);
          }
        }

        sendHeartbeat();
        setInterval(sendHeartbeat, HEARTBEAT_INTERVAL_MS);
      })();
    </script>
  </body>
</html>
